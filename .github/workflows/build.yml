name: Build Blackside Bass

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: cmake -B build -S . -DJUCE_DIR=JUCE

      - name: Build plugin
        run: cmake --build build --config Release --target BlacksideBass_VST3

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlacksideBass
          path: build/BlacksideBass_artefacts/Release/VST3
